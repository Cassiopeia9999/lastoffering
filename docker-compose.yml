services:

  # ── MySQL 数据库 ─────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: lostfound_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass123}
      MYSQL_DATABASE: ${DB_NAME:-lostfound}
      MYSQL_USER: ${DB_USER:-lostfound}
      MYSQL_PASSWORD: ${DB_PASSWORD:-lostfound123}
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"      # 可按需注释掉，仅内部访问
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-rootpass123}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI 后端 ─────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: lostfound_backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_PORT: ${DB_PORT:-3306}
      DB_USER: ${DB_USER:-lostfound}
      DB_PASSWORD: ${DB_PASSWORD:-lostfound123}
      DB_NAME: ${DB_NAME:-lostfound}
      SECRET_KEY: ${SECRET_KEY:-please-change-this-secret-key-in-production}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
      UPLOAD_DIR: media/images
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost}
    volumes:
      - media_data:/app/media/images
    # GPU 支持（要求宿主机安装 nvidia-container-toolkit）
    # 若无 GPU 可删除 deploy 段
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    ports:
      - "8000:8000"      # 可按需注释掉，仅内部访问
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── Nginx 前端 ──────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: lostfound_frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"

volumes:
  mysql_data:
    driver: local
  media_data:
    driver: local
